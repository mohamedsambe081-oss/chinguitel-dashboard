{% load static %}
<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Connexion — Chinguitel</title><link rel="stylesheet" href="{% static 'revenue/css/dashboard.css' %}"></head><body class="auth-page"><main class="auth-card"><div class="brand auth-brand"><img class="brand-logo-img" src="{% static 'revenue/img/chinguitel_logo.jpeg' %}" alt="Chinguitel logo"><div><div class="brand-name">Chinguitel</div><div class="brand-sub">membre du groupe expresso</div></div></div><h2>Connexion</h2>{% if messages %}{% for message in messages %}<div class="message {{ message.tags }}">{{ message }}</div>{% endfor %}{% endif %}<form method="post" class="auth-form">{% csrf_token %}<label>Nom d'utilisateur<input name="username" required autocomplete="username"></label><label>Mot de passe<input type="password" name="password" required autocomplete="current-password"></label><button class="apply auth-primary-btn" type="submit">Se connecter</button></form><p class="auth-link">Pas encore de compte ? <a href="{% url 'revenue:register' %}">Créer un compte</a></p></main></body></html>
